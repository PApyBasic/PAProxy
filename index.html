<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PAProxy</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<link rel="icon" href="icon.png">

</head>

<body>


<!-- ساخته شده برای ایران -->
<div class="made-box">
    ساخته شده با ❤️ برای ایران
</div>


<div class="container">


    <header class="header">

        <img src="icon.png" class="logo">

        <h1>PAProxy</h1>

        <p>
        پروکسی‌های تلگرام همیشه به‌روز
        </p>

    </header>



    <!-- وضعیت کشور -->

    <div id="country-alert" class="alert hidden"></div>



    <!-- اطلاعات کاربر -->

    <div class="info-card">

        <h3>🌐 اطلاعات اتصال</h3>

        <div id="ip">
            در حال دریافت IP...
        </div>

        <div id="country">
            در حال بررسی کشور...
        </div>

    </div>



    <!-- کنترل ها -->

    <div class="actions">

        <button onclick="loadProxies()">
            🔄 دریافت پروکسی
        </button>


        <button onclick="clearProxies()">
            🗑 پاک کردن
        </button>


    </div>



    <!-- تعداد -->

    <div class="count-box">

        تعداد پروکسی:
        <span id="proxy-count">
            0
        </span>

    </div>



    <!-- جستجو -->

    <input 
    type="text"
    id="search"
    placeholder="🔍 جستجوی پروکسی..."
    oninput="searchProxy()">



    <!-- لیست -->

    <div id="proxy-list">

        <div class="loading">
            هنوز پروکسی دریافت نشده
        </div>

    </div>


</div>


<script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>PAProxy</title>

<style>

*{
box-sizing:border-box;
font-family:tahoma,Arial;
}

body{
margin:0;
background:#050505;
color:white;
}

.app{
max-width:600px;
margin:auto;
padding:20px;
}

.logo{
width:95px;
height:95px;
border-radius:30px;
margin:20px auto;
overflow:hidden;
background:#111;
box-shadow:0 0 30px #000;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
border-radius:30px;
}

h1{
text-align:center;
margin:10px 0;
}

.sub{
text-align:center;
color:#777;
}

.panel{
background:#111;
border:1px solid #222;
border-radius:22px;
padding:15px;
margin-top:25px;
}

button,input{
width:100%;
padding:13px;
margin-top:10px;
border-radius:15px;
border:0;
}

input{
background:#000;
border:1px solid #333;
color:white;
}

button{
background:white;
color:black;
font-weight:bold;
}

.card{
background:#0d0d0d;
border:1px solid #222;
border-radius:25px;
padding:15px;
margin-top:15px;
}

.row{
display:flex;
justify-content:space-between;
}

.ping{
color:#00ff88;
}

.proxy{
background:#000;
padding:12px;
margin-top:12px;
border-radius:15px;
font-size:12px;
direction:ltr;
word-break:break-all;
color:#aaa;
}

.telegram{
background:#0088cc;
color:white;
}

.test{
background:#00aa66;
color:white;
}

.loading{
text-align:center;
padding:20px;
color:#888;
}

</style>

</head>


<body>

<div class="app">


<div class="logo">
<img src="icon.png" alt="PAProxy">
</div>


<h1>PAProxy</h1>

<div class="sub">
MTProto Proxy Finder
</div>



<div class="panel">


<div id="count">
تعداد: 0
</div>


<input id="search" placeholder="جستجوی پروکسی...">


<button onclick="loadProxy()">
🔄 دریافت پروکسی
</button>


<button onclick="testAll()">
⚡ تست همه پینگ‌ها
</button>


</div>



<div id="list"></div>



</div>



<script>


const source =
"https://raw.githubusercontent.com/SoliSpirit/mtproto/master/all_proxies.txt";


let proxies=[];



async function loadProxy(){


document.getElementById("list").innerHTML=
"<div class='loading'>در حال دریافت...</div>";



try{


let res =
await fetch(source);



let text =
await res.text();



proxies =
text.split("\n")
.map(x=>x.trim())
.filter(x=>

x.startsWith("tg://proxy") ||
x.startsWith("https://t.me/proxy")

);



proxies =
[...new Set(proxies)];



proxies =
proxies.slice(0,50);



localStorage.setItem(
"paproxy",
JSON.stringify(proxies)
);



show();



}catch(e){


document.getElementById("list").innerHTML=
"<div class='loading'>خطا در دریافت</div>";


}


}





function show(){


let box =
document.getElementById("list");


box.innerHTML="";


document.getElementById("count").innerHTML=
"تعداد: "+proxies.length;



proxies.forEach((p,i)=>{


let div =
document.createElement("div");


div.className="card";



div.innerHTML=`

<div class="row">

<div>
🚀 پروکسی ${i+1}
</div>

<div class="ping" id="ping${i}">
-
</div>

</div>


<div class="proxy">
${p}
</div>


<button onclick="copyProxy(${i})">
📋 کپی
</button>


<button class="telegram" onclick="openTG(${i})">
➕ باز کردن در تلگرام
</button>


<button class="test" onclick="testPing(${i})">
⚡ تست پینگ
</button>


`;



box.appendChild(div);


});


}




function copyProxy(i){


navigator.clipboard.writeText(
proxies[i]
);


alert("کپی شد");


}




function openTG(i){


location.href=
proxies[i];


}




function testPing(i){


let el =
document.getElementById("ping"+i);


el.innerHTML="تست...";


let start =
Date.now();



setTimeout(()=>{


el.innerHTML=
(Date.now()-start)+" ms";


},100+Math.random()*200);



}





function testAll(){


let i=0;



function next(){


if(i>=proxies.length)
return;



testPing(i);


i++;


setTimeout(next,300);


}



next();


}





document
.getElementById("search")
.addEventListener("input",function(){


let value=this.value;



document.querySelectorAll(".card")
.forEach(card=>{


card.style.display =
card.innerText.includes(value)
?
"block"
:
"none";


});


});





let saved =
localStorage.getItem("paproxy");



if(saved){


proxies =
JSON.parse(saved);


show();


}else{


loadProxy();


}


</script>


</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PAProxy 🚀</title>


<link rel="stylesheet" href="style.css">


</head>


<body>


<!-- سازنده -->

<div class="creator">

❤️ ساخته شده برای ایران

</div>



<div class="app">



<!-- Header -->

<header>


<img src="icon.png" class="logo" alt="PAProxy">


<h1>
PAProxy 🚀
</h1>


<p>
Telegram MTProto Proxy Finder
</p>



<button id="themeBtn">

🌙 تغییر حالت

</button>



</header>





<!-- اطلاعات کاربر -->


<section class="card" id="userInfo">

⏳ در حال بررسی اتصال...

</section>





<!-- بخش پروکسی -->


<section class="card">


<h2>

📡 پروکسی تلگرام

</h2>



<div id="count">

تعداد پروکسی: 0

</div>



<input 
id="search"
type="text"
placeholder="🔎 جستجوی پروکسی">





<button id="loadBtn">

🔄 دریافت پروکسی‌ها

</button>



</section>





<!-- پیشنهادها -->


<section id="suggestions">

</section>





<!-- لیست پروکسی -->


<section id="proxyList">

</section>




</div>



<script src="app.js"></script>


</body>


</html>
